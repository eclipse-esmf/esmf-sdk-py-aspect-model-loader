[tox]
isolated_build = true
toxworkdir = ../../.tox
envlist =
    pep8
    py310

[testenv]
allowlist_externals = uv
description = Run the tests
commands_pre =
    uv sync
    uv run download-samm-release
commands =
    uv run pytest {posargs: \
    -x -s -vv \
    --cov=esmf_aspect_meta_model_python/ \
    --cov-fail-under=85 \
    tests/ \
    --import-mode importlib}

[testenv:pep8]
allowlist_externals = uv
description = Run code style checks
# Use the uv-venv-lock-runner to automatically sync packages from your uv.lock
runner = uv-venv-lock-runner
dependency_groups =
    dev
commands =
    black --line-length 120 esmf_aspect_meta_model_python
    black --line-length 120 tests
    flake8 esmf_aspect_meta_model_python/ tests/
    isort --check-only --diff esmf_aspect_meta_model_python tests
    mypy .

[flake8]
exclude = __init__.py, __pycache__
max-complexity = 10
max-line-length = 120

[isort]
combine_as_imports = true
default_section = THIRDPARTY
include_trailing_comma = true
known_first_party = esmf_aspect_meta_model_python, tests
line_length = 120
lines_between_types = 1
multi_line_output = 3
sections = STDLIB, THIRDPARTY, FIRSTPARTY, LOCALFOLDER
